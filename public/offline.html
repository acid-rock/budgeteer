<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e5a3c" />
    <title>Offline · Budgeteer</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #f3f6f0;
        color: #16241c;
        font-family: "DM Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .tile {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: #0e5a3c;
        color: #bff24a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        font-weight: 700;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 22px;
        margin: 0 0 8px;
      }
      p {
        color: #62756a;
        max-width: 320px;
        line-height: 1.5;
        margin: 0 0 20px;
      }
      button {
        font: inherit;
        font-weight: 600;
        color: #fff;
        background: #0e5a3c;
        border: none;
        border-radius: 11px;
        padding: 11px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="tile">B</div>
      <h1>You&rsquo;re offline</h1>
      <p>Budgeteer needs a connection to load your data. Check your network and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
