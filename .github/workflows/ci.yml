name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

# Cancel superseded runs on the same ref (e.g. quick successive pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # Placeholder values so `prisma generate` and `next build` resolve the env
    # they reference. These are NOT secrets — real credentials live in the host's
    # environment. Upstash vars are intentionally unset (rate limiting disables
    # itself gracefully when they're absent).
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/budgeteer
      DIRECT_URL: postgresql://ci:ci@localhost:5432/budgeteer
      AUTH_SECRET: ci-placeholder-secret
      AUTH_GITHUB_ID: ci-placeholder
      AUTH_GITHUB_SECRET: ci-placeholder
      AUTH_GOOGLE_ID: ci-placeholder
      AUTH_GOOGLE_SECRET: ci-placeholder
      NEXT_TELEMETRY_DISABLED: "1"
      # Sentry source-map upload. These come from repo secrets and are empty when
      # unset — the Sentry build plugin then skips the upload and the build still
      # succeeds. Set them in repo Settings → Secrets to enable de-minified traces.
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
